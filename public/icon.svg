<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="80%" r="90%">
      <stop offset="0%" stop-color="#0e68e4"/>
      <stop offset="100%" stop-color="#02144a"/>
    </radialGradient>
    <linearGradient id="bubbleRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7b7b"/>
      <stop offset="50%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#8a0000"/>
    </linearGradient>
    <linearGradient id="bubbleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7bc4ff"/>
      <stop offset="50%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#002d8a"/>
    </linearGradient>
    <linearGradient id="bubbleGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7bff7b"/>
      <stop offset="50%" stop-color="#00cc00"/>
      <stop offset="100%" stop-color="#006600"/>
    </linearGradient>
    <linearGradient id="bubbleYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffff7b"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#b38f00"/>
    </linearGradient>
    <linearGradient id="bubblePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7bff"/>
      <stop offset="50%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#8a006e"/>
    </linearGradient>
    <linearGradient id="bubblePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d47bff"/>
      <stop offset="50%" stop-color="#9900ff"/>
      <stop offset="100%" stop-color="#4e008a"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <!-- Ray burst -->
    <radialGradient id="rayBurst" cx="50%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#4deeea" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#02144a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Light Rays -->
  <path d="M 256 430 L -100 -100 M 256 430 L 100 -100 M 256 430 L 300 -100 M 256 430 L 500 -100 M 256 430 L 700 -100 M 256 430 L -100 200 M 256 430 L 700 200" stroke="rgba(255,255,255,0.15)" stroke-width="40" stroke-linecap="round"/>

  <!-- Row 1: Bubbles -->
  <g filter="url(#dropShadow)" transform="translate(10, 20)">
    <circle cx="60" cy="50" r="45" fill="url(#bubblePink)"/>
    <circle cx="158" cy="50" r="45" fill="url(#bubbleBlue)"/>
    <circle cx="256" cy="50" r="45" fill="url(#bubbleGreen)"/>
    <circle cx="354" cy="50" r="45" fill="url(#bubbleRed)"/>
    <circle cx="452" cy="50" r="45" fill="url(#bubblePurple)"/>
  </g>

  <!-- Row 2: Bubbles -->
  <g filter="url(#dropShadow)" transform="translate(10, 20)">
    <circle cx="109" cy="120" r="45" fill="url(#bubbleYellow)"/>
    <circle cx="207" cy="120" r="45" fill="url(#bubblePink)"/>
    <circle cx="305" cy="120" r="45" fill="url(#bubbleBlue)"/>
    <circle cx="403" cy="120" r="45" fill="url(#bubbleYellow)"/>
    
    <circle cx="11" cy="120" r="45" fill="url(#bubblePurple)"/>
    <circle cx="501" cy="120" r="45" fill="url(#bubbleRed)"/>
  </g>

  <!-- Title BUBBLE (Big and bubbly) -->
  <path id="bubblePath" d="M 80 230 Q 256 200 432 230" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="75" fill="#facc15" stroke="#b45309" stroke-width="8" stroke-linejoin="round" x="50%" text-anchor="middle" y="240" filter="url(#dropShadow)">
    BUBBLE
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="75" fill="#fef08a" x="50%" text-anchor="middle" y="240">
    BUBBLE
  </text>
  
  <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#ffffff" stroke="#1e3a8a" stroke-width="8" stroke-linejoin="round" x="50%" text-anchor="middle" y="320" filter="url(#dropShadow)">
    SHOOTERS
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="url(#textGrad)" x="50%" text-anchor="middle" y="320">
    SHOOTERS
  </text>

  <!-- PRO Ribbon -->
  <g transform="translate(166, 310)" filter="url(#dropShadow)">
    <path d="M -30 40 L 0 10 L 0 70 Z" fill="#991b1b"/>
    <path d="M 210 40 L 180 10 L 180 70 Z" fill="#991b1b"/>
    <rect x="-10" y="20" width="200" height="40" fill="#ef4444" rx="8"/>
    <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="#fef08a" x="90" text-anchor="middle" y="49">
      &#9733; PRO &#9733;
    </text>
  </g>

  <!-- Glowing Bubble at bottom (Cannon) -->
  <circle cx="256" cy="450" r="50" fill="url(#bubblePurple)" filter="url(#glow)"/>
  
  <path d="M 206 512 A 50 50 0 0 1 306 512" fill="#facc15"/>
  <circle cx="256" cy="425" r="30" fill="rgba(255,255,255,0.4)" filter="blur(2px)"/>
  
  <circle cx="256" cy="380" r="10" fill="url(#bubblePurple)"/>
  <circle cx="256" cy="355" r="8" fill="url(#bubblePurple)"/>
  
  <!-- Outer border -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#facc15" stroke-width="12" filter="url(#glow)"/>
</svg>
